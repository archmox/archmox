name = "archmox-api"
main = "index.js"
compatibility_date = "2026-06-13"

# Route config: archmox subdomains
# All subdomains are served by their respective Pages projects
# Worker only handles API endpoints on all subdomains
# SSL is covered by *.acretionos.org Universal SSL wildcard
routes = [
  { pattern = "archmox.acreetionos.org/api/*", zone_name = "acreetionos.org" },
  { pattern = "pve.archmox.acreetionos.org/api/*", zone_name = "acreetionos.org" },
  { pattern = "pbs.archmox.acreetionos.org/api/*", zone_name = "acreetionos.org" },
  { pattern = "pmg.archmox.acreetionos.org/api/*", zone_name = "acreetionos.org" },
  { pattern = "docs.archmox.acreetionos.org/api/*", zone_name = "acreetionos.org" },
  { pattern = "cdn.archmox.acreetionos.org/api/*", zone_name = "acreetionos.org" },
]

[triggers]
crons = ["*/30 * * * *"]

[vars]
CONTACT_EMAIL = "security@archmox.acreetionos.org"
FLEET_VERSION = "1.0.0"

# Secrets (set via `wrangler secret put`):
#   DISCORD_WEBHOOK   — Discord webhook for contact/security reports
#   SECURITY_WEBHOOK  — Webhook for security reports
