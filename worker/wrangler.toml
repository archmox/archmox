name = "archmox-api"
main = "index.js"
compatibility_date = "2026-06-13"

# Route config: archmox subdomains
# Main site archmox.acreetionos.org is served by the Pages project
# Only /api/* routes go to the Worker for the main domain
# Subdomains (pve, pbs, pmg, docs, cdn) are served fully by the Worker
# SSL is covered by *.acretionos.org Universal SSL wildcard
routes = [
  # Main site — only API routes go to Worker
  { pattern = "archmox.acreetionos.org/api/*", zone_name = "acreetionos.org" },
  # Subdomains — full routing through Worker
  { pattern = "pve.archmox.acreetionos.org/*", zone_name = "acreetionos.org" },
  { pattern = "pbs.archmox.acreetionos.org/*", zone_name = "acreetionos.org" },
  { pattern = "pmg.archmox.acreetionos.org/*", zone_name = "acreetionos.org" },
  { pattern = "docs.archmox.acreetionos.org/*", zone_name = "acreetionos.org" },
  { pattern = "cdn.archmox.acreetionos.org/*", zone_name = "acreetionos.org" },
]

[triggers]
crons = ["*/30 * * * *"]

[vars]
CONTACT_EMAIL = "security@archmox.acreetionos.org"
FLEET_VERSION = "1.0.0"

# Secrets (set via `wrangler secret put`):
#   DISCORD_WEBHOOK   — Discord webhook for contact/security reports
#   SECURITY_WEBHOOK  — Webhook for security reports
